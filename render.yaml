databases:
  - name: sfa-db
    plan: free
    databaseName: sfa
    user: sfa

services:
  - type: web
    name: special-fund-approval
    runtime: node
    plan: free
    region: singapore
    branch: main
    buildCommand: >
      npm install &&
      npx prisma generate --schema=prisma/schema.production.prisma &&
      npm run build
    startCommand: >
      npx prisma db push --schema=prisma/schema.production.prisma --accept-data-loss &&
      node prisma/seed.mjs &&
      npx next start -p $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sfa-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
